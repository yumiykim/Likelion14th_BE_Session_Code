{% extends 'base.html' %}

{% block content %}
{% load static %}
<div class="card-grid">
    {% for blog in blogs %}
        <div class="card">
            <div class="card-content">
                <h2>{{ blog.title }}</h2>
                <p>{{ blog.summary }}</p>
                <a href="{% url 'main:detail' blog.id %}">자세히 보기</a>
            </div>
            <div class="card-footer">
                <div class="divider"></div>
                <span>{{ blog.writer }}</span>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
