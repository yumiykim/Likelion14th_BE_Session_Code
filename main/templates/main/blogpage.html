{% extends 'base.html' %}

{% block content %}
{% load static %}
<div class="card-grid">
    {% for blog in blogs %}
        <div class="card">
            <div class="card-content">
                <h2>{{ blog.title }}</h2>
                <div class="card-header">
                    <p>{{ blog.writer }}</p>
                    <p>{{ blog.pub_date }}</p>
                </div>
                <div class="divider"></div>
                <p class="card-summary">{{ blog.summary }}</p>
            </div>

            <div class="card-footer">
                <div class="divider"></div>
                <a href="{% url 'main:detail' blog.id %}">자세히 보기</a>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
