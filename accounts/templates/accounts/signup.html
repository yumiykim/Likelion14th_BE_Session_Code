{% extends 'base.html' %}
{% load static %}

{% block content %}
    <div class="form-wrapper">
        <form action="{% url 'accounts:signup' %}" method="post">
            {% csrf_token %}
            <div class="form-title">회원가입</div>

            <div class="form-group">
                <label for="writer">아이디</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="pub_date">비밀번호</label>
                <input type="text" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="pub_date">비밀번호 확인</label>
                <input type="text" id="confirm" name="confirm" required>

{#            13기 세션처럼 아이디 / 비밀번호 먼저 실습하고#}
{#            1:1 필드 설명하고 이름 / 닉네임은 나중에 실습하기!!#}

            <div class="form-group">
                <label for="content">닉네임</label>
                <input type="text" id="nickname" name="nickname" required></input>
            </div>

            <div class="form-group">
                <label for="title">전공</label>
                <input type="text" id="majo" name="major" >
            </div>

            <button type="submit">회원가입</button>
        </form>
    </div>
{% endblock %}
